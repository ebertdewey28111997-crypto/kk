<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>趣味夸夸互动（AI夸夸馆）</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- qrcode.js library for QR generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- 屏幕一：欢迎页 -->
        <section id="welcome-screen" class="screen active">
            <div class="content-wrapper text-center">
                <div class="illustration">
                    <!-- Warm illustration placeholder -->
                    <div class="glow-circle"></div>
                    <div class="glow-circle small"></div>
                </div>
                <h1 class="main-title">欢迎来到夸夸馆</h1>
                <p class="subtitle">一个小故事，发现你不知道的自己</p>
                <button class="primary-btn mt-large" onclick="app.goToScreen('name-screen')">开始体验</button>
            </div>
        </section>

        <!-- 屏幕二：输入昵称 -->
        <section id="name-screen" class="screen">
            <div class="content-wrapper text-center">
                <h2 class="section-title">先告诉我，你希望被怎么称呼？</h2>
                <div class="input-group">
                    <input type="text" id="nickname-input" placeholder="输入你的专属称呼" autocomplete="off" maxlength="10">
                </div>
                <button class="primary-btn" onclick="app.submitName()">就叫我这个</button>
            </div>
        </section>

        <!-- 屏幕三：情景故事 + 第一次选择 -->
        <section id="story-1-screen" class="screen">
            <div class="content-wrapper">
                <div class="story-card">
                    <p id="story-1-text" class="story-text"></p>
                </div>
                <div id="story-1-options" class="options-container">
                    <!-- Options injected by JS -->
                </div>
            </div>
        </section>

        <!-- 屏幕四：情景延续 + 第二次选择 -->
        <section id="story-2-screen" class="screen">
            <div class="content-wrapper">
                <div class="story-card">
                    <p id="story-2-text" class="story-text"></p>
                </div>
                <div id="story-2-options" class="options-container">
                    <!-- Options injected by JS -->
                </div>
            </div>
        </section>

        <!-- 屏幕五：AI生成过渡动画 -->
        <section id="loading-screen" class="screen">
            <div class="content-wrapper text-center flex-center">
                <div class="loading-animation">
                    <div class="firefly"></div>
                    <div class="firefly"></div>
                    <div class="firefly"></div>
                    <div class="firefly"></div>
                    <div class="firefly"></div>
                </div>
                <p class="loading-text">正在发现你的闪光点……</p>
            </div>
        </section>

        <!-- 屏幕六：结果展示页 -->
        <section id="result-screen" class="screen">
            <div class="content-wrapper">
                <div class="result-card">
                    <h2 id="result-title" class="result-title"></h2>
                    <div id="result-content" class="result-content"></div>
                    
                    <div class="result-footer">
                        <div class="qr-code-wrapper">
                            <div id="qrcode"></div>
                        </div>
                        <div class="footer-text">
                            <p class="scan-hint">扫码保存，随时回看</p>
                            <p class="disclaimer">*仅供娱乐</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- 背景元素 -->
    <div class="bg-elements">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
